# Compose override. Use with docker-compose.yml.
services:
  memory-agent:
    environment:
      CHAINLIT_DATABASE_URL: postgresql+asyncpg://memory_agent:memory_agent@chainlit-postgres:5432/chainlit
    depends_on:
      chainlit-postgres:
        condition: service_healthy

  chainlit-postgres:
    image: postgres:16
    container_name: memory-agent-chainlit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: memory_agent
      POSTGRES_PASSWORD: memory_agent
      POSTGRES_DB: chainlit
    ports:
      - "5432:5432"
    volumes:
      - chainlit_postgres_data:/var/lib/postgresql/data
      - ./scripts/sql/init_chainlit_schema.sql:/docker-entrypoint-initdb.d/01-init_chainlit_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_agent -d chainlit"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  chainlit_postgres_data:
