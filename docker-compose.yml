x-app-build: &app-build
  context: .
  args:
    APP_UID: ${APP_UID:-1000}
    APP_GID: ${APP_GID:-1000}
    TORCH_PACKAGE: ${TORCH_PACKAGE:-torch==2.12.0+cpu}
    TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}

services:
  memory-agent:
    build: *app-build
    env_file:
      - .env
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-agent_memories}
      QDRANT_PREFER_GRPC: ${QDRANT_PREFER_GRPC:-false}
      EMBEDDING_BACKEND: remote
      EMBEDDING_SERVICE_URL: http://embedding-service:8001
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      EMBEDDING_TIMEOUT: ${EMBEDDING_TIMEOUT:-30}
      EMBEDDING_TRUST_ENV: ${EMBEDDING_TRUST_ENV:-false}
    ports:
      - "8000:8000"
    volumes:
      - checkpoint_data:/app/data
    depends_on:
      qdrant:
        condition: service_started
      embedding-service:
        condition: service_healthy
    restart: unless-stopped

  embedding-service:
    build: *app-build
    command:
      - uvicorn
      - embedding_server:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
    environment:
      EMBEDDING_MODEL: /app/models/bge-m3
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-auto}
      EMBEDDING_CONCURRENCY: ${EMBEDDING_CONCURRENCY:-1}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
    ports:
      - "8001:8001"
    volumes:
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.15.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  checkpoint_data:
  qdrant_storage:
